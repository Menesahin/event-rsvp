services:
  postgres:
    image: postgres:16-alpine
    container_name: event-rsvp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-event_rsvp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-event_rsvp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-event_rsvp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-event_rsvp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: event-rsvp-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-event_rsvp}:${POSTGRES_PASSWORD:-event_rsvp_dev_password}@postgres:5432/${POSTGRES_DB:-event_rsvp}
    command: sh -c "pnpm prisma migrate deploy && pnpm db:seed"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-rsvp-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-event_rsvp}:${POSTGRES_PASSWORD:-event_rsvp_dev_password}@postgres:5432/${POSTGRES_DB:-event_rsvp}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY:-}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      DEV_MODE: ${DEV_MODE:-true}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    name: event-rsvp-postgres-data
